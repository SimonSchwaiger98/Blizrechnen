<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Blitzrechnen</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Fredoka One', sans-serif;
  background: linear-gradient(135deg, #dbe7f1, #f4f7fb);
  text-align: center;
  padding: 40px;
  margin: 0;
}

h1 {
  font-size: 56px;
  margin-bottom: 20px;
}

#taskDisplay {
  font-size: 52px;
  margin: 60px auto;
  min-height: 100px;
  padding: 30px 50px;
  background: white;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.08);
  transition: all 0.2s ease;
}

button {
  font-family: inherit;
  font-size: 16px;
  padding: 12px 20px;
  border-radius: 12px;
  border: none;
  background: white;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
  cursor: pointer;
  transition: all 0.2s ease;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.12);
}

.duration-btn.active,
.toggle-btn.active {
  background: #3b82f6;
  color: white;
}

#modeSelection button {
  font-size: 18px;
  padding: 14px 28px;
  margin: 10px;
}

#answerInput {
  font-size: 24px;
  padding: 14px;
  width: 200px;
  border-radius: 12px;
  border: none;
  background: #e8f5e9;
  box-shadow: inset 0 3px 6px rgba(0,0,0,0.08);
}

#answerInput.wrong {
  background: #fde2e2;
}

#stats {
  margin-top: 20px;
  font-size: 18px;
  opacity: 0.7;
}

#menuBtn {
  position: absolute;
  top: 25px;
  left: 25px;
  font-size: 18px;
  padding: 10px 16px;
  border-radius: 12px;
  background: white;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
}

#summary {
  margin-top: 30px;
}
  #perfectImg {
  display: none;
  width: 120px;     /* hier Größe anpassen */
  height: auto;
  margin-top: 20px;
}
/* ===== Growth Mindset Skala ===== */

#reflectionSection {
  margin-top: 40px;
}

.scale-wrapper {
  position: relative;
  max-width: 500px;
  margin: 30px auto;
}

.scale-line {
  display: flex;
  justify-content: space-between;
  font-size: 40px;
  position: relative;
}

.scale-line::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 5%;
  right: 5%;
  height: 4px;
  background: #d1d5db;
  transform: translateY(-50%);
  border-radius: 4px;
  z-index: 0;
}

.scale-item {
  cursor: pointer;
  z-index: 1;
  transition: transform 0.2s ease, opacity 0.2s ease;
}

.scale-item:hover {
  transform: scale(1.2);
}

.marker {
  position: absolute;
  font-size: 22px;
  transition: left 0.3s ease;
}

.marker.self {
  color: black;
  top: 55px;
}

.marker.system {
  color: #16a34a;
  top: 80px;
}
</style>
</head>

<body>

<h1>⚡ Blitzrechnen ⚡</h1>

<div id="modeSelection">
  <button onclick="setMode('kopf')">🧠 Im Kopf bis 100</button>
  <button onclick="setMode('einmaleins')">🔢 Einmaleins</button>
  <button onclick="setMode('geldLeicht')">💰 Geld leicht</button>
  <button onclick="setMode('geldSchwer')">💶 Geld schwierig</button>
</div>

<button id="menuBtn" onclick="goToMenu()">🏠</button>

<div>
  Anzeigezeit:
  <button class="duration-btn active" onclick="setDuration(1500,this)">🚀</button>
  <button class="duration-btn" onclick="setDuration(2500,this)">🐇</button>
  <button class="duration-btn" onclick="setDuration(3500,this)">🐢</button>
</div>

<div id="taskDisplay">Bitte Modus wählen</div>

<div>
  <label style="font-size:20px;">Lösung: </label>
  <input type="text" id="answerInput" disabled>

  <span id="unitSelection" style="display:none;">
    <button class="toggle-btn active" id="euroBtn" onclick="setUnit('euro')">Euro</button>
    <button class="toggle-btn" id="centBtn" onclick="setUnit('cent')">Cent</button>
  </span>

  <button onclick="checkAnswer()">✔ Prüfen</button>
  <button onclick="repeatTask()">🔁 Wiederholen</button>
</div>

<div id="stats">0 von 10 richtig</div>

<div id="summary" style="display:none;">
  <p id="finalMessage"></p>

  <div id="reflectionSection" style="display:none;">
    <h3>🌱 Wie lief es für dich?</h3>

    <div class="scale-wrapper">
      <div class="scale-line">
        <div class="scale-item" onclick="selectReflection(1)">🌱</div>
        <div class="scale-item" onclick="selectReflection(2)">🌿</div>
        <div class="scale-item" onclick="selectReflection(3)">🌳</div>
        <div class="scale-item" onclick="selectReflection(4)">🌻</div>
      </div>

      <div id="selfMarker" class="marker self">▲</div>
      <div id="systemMarker" class="marker system" style="display:none;">▲</div>
    </div>
  </div>

  <img id="perfectImg" src="tiger pokal.png">
</div>

<script>

let selfRating = null;
let totalTasks = 10;
let currentTask = 0;
let correctCount = 0;
let correctAnswer = null;
let currentMode = null;
let currentTaskText = "";
let answerUnit = "euro";
let displayDuration = 1500;

let allowedLevels = [1,2,3];
let wrongStreak = 0;
let usedTasks = new Set();

function setDuration(ms,btn){
  displayDuration = ms;
  document.querySelectorAll(".duration-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function setMode(mode){
  currentMode = mode;
  document.getElementById("modeSelection").style.display="none";
  document.getElementById("menuBtn").style.display="inline";

  if(mode.includes("geld")){
    document.getElementById("unitSelection").style.display="inline";
    setUnit("euro");
  } else {
    document.getElementById("unitSelection").style.display="none";
  }

  startRound();
}

function goToMenu(){
  document.getElementById("modeSelection").style.display="block";
  document.getElementById("menuBtn").style.display="none";
  document.getElementById("summary").style.display="none";
  document.getElementById("taskDisplay").textContent="Bitte Modus wählen";
  document.getElementById("stats").textContent="0 von 10 richtig";
}

function setUnit(unit){
  answerUnit = unit;
  document.getElementById("euroBtn").classList.toggle("active", unit==="euro");
  document.getElementById("centBtn").classList.toggle("active", unit==="cent");
}

function startRound(){
  currentTask=0;
  correctCount=0;
  wrongStreak=0;
  allowedLevels=[1,2,3];
  usedTasks=new Set();
  document.getElementById("summary").style.display="none";
  nextTask();
}

function getRandomLevel(){
  if(allowedLevels.length===1) return 1;
  if(allowedLevels.length===2) return Math.random()<0.7?2:1;

  let r=Math.random();
  if(r<0.15) return 1;
  if(r<0.60) return 2;
  return 3;
}

function reduceDifficulty(){
  if(allowedLevels.length===3) allowedLevels=[1,2];
  else if(allowedLevels.length===2) allowedLevels=[1];
}

function formatMoney(cents){
  return (cents/100).toFixed(2).replace(".",",")+" €";
}

function randomMoney(maxEuro){
  return Math.floor(Math.random()*maxEuro*10)*10;
}

function randomMoneyFormat(cents){

  // Über 100 Cent niemals als reine Centzahl anzeigen
  if(cents > 100){

    let euro=Math.floor(cents/100);
    let cent=cents%100;

    if(Math.random()<0.4 && cent!==0){
      return euro+" € "+cent+" ct";
    }

    return formatMoney(cents);
  }

  return cents+" ct";
}

function generateTask(){
  switch(currentMode){
    case "kopf": return generateKopf();
    case "einmaleins": return generateEinmaleins();
    case "geldLeicht": return generateGeldLeicht();
    case "geldSchwer": return generateGeldSchwer();
  }
}

function generateKopf(){
  let level=getRandomLevel();
  let max=level===1?20:level===2?50:100;
  let a=Math.floor(Math.random()*max)+1;
  let b=Math.floor(Math.random()*max)+1;
  let op=level===1?"+":(Math.random()<0.5?"+":"-");
  if(op==="-"&&b>a){[a,b]=[b,a];}
  correctAnswer=op==="+"?a+b:a-b;
  return `${a} ${op} ${b}`;
}

function generateEinmaleins(){
  let level=getRandomLevel();
  let max=level===1?5:level===2?10:12;
  let a=Math.floor(Math.random()*max)+1;
  let b=Math.floor(Math.random()*max)+1;
  correctAnswer=a*b;
  return `${a} · ${b}`;
}

function generateGeldLeicht(){

  let level = getRandomLevel();

  function randomEuro(max){
    return (Math.floor(Math.random()*max)+1) * 100;
  }

  function randomCent(){
    return (Math.floor(Math.random()*5)+1) * 10; // 10–50 ct
  }

  function randomEuroWithCent(max){
    let euro = Math.floor(Math.random()*max)+1;
    let cent = (Math.floor(Math.random()*9)+1) * 10;
    return euro*100 + cent;
  }

  // LEVEL 1 – nur einfache Addition
  if(level === 1){

    let euro = randomEuro(10);
    let cent = randomCent();

    correctAnswer = euro + cent;
    return `${euro/100} € + ${cent} ct`;
  }

  // LEVEL 2 – meistens +, manchmal -
  if(level === 2){

    let a = randomEuroWithCent(10);
    let b = randomCent();

    let op = Math.random() < 0.7 ? "+" : "-";

    if(op === "-"){
      if(b > a) [a,b] = [b,a];
      correctAnswer = a - b;
    } else {
      correctAnswer = a + b;
    }

    return `${randomMoneyFormat(a)} ${op} ${b} ct`;
  }

  // LEVEL 3 – + und − gemischt, auch Cent + Cent
  if(level === 3){

    if(Math.random() < 0.5){

      let a = randomEuroWithCent(15);
      let b = randomCent();
      let op = Math.random() < 0.5 ? "+" : "-";

      if(op === "-"){
        if(b > a) [a,b] = [b,a];
        correctAnswer = a - b;
      } else {
        correctAnswer = a + b;
      }

      return `${randomMoneyFormat(a)} ${op} ${b} ct`;

    } else {

      let c1 = randomCent();
      let c2 = randomCent();
      let op = Math.random() < 0.5 ? "+" : "-";

      if(op === "-"){
        if(c2 > c1) [c1,c2] = [c2,c1];
        correctAnswer = c1 - c2;
      } else {
        correctAnswer = c1 + c2;
      }

      return `${c1} ct ${op} ${c2} ct`;
    }
  }
}

function generateGeldSchwer(){

  let level = getRandomLevel();

  // Hilfsfunktion: glatter Eurobetrag
  function randomEuro(max){
    return (Math.floor(Math.random()*max)+1) * 100;
  }

  // Hilfsfunktion: Betrag mit 10-Cent-Schritten
  function randomEuroWithCent(max){
    let euro = Math.floor(Math.random()*max)+1;
    let cent = Math.floor(Math.random()*10)*10;
    return euro*100 + cent;
  }

  // LEVEL 1 – einfache Addition, nur eine Zahl mit Cent
  if(level === 1){

    let a = randomEuroWithCent(40);
    let b = randomEuro(40);

    correctAnswer = a + b;
    return `${randomMoneyFormat(a)} + ${randomMoneyFormat(b)}`;
  }

  // LEVEL 2 – + oder -, nur eine Zahl mit Cent
  if(level === 2){

    let withCent = randomEuroWithCent(80);
    let wholeEuro = randomEuro(80);

    let op = Math.random() < 0.5 ? "+" : "-";

    let a = withCent;
    let b = wholeEuro;

    if(op === "-" && b > a){
      [a,b] = [b,a];
    }

    correctAnswer = op === "+" ? a + b : a - b;

    return `${randomMoneyFormat(a)} ${op} ${randomMoneyFormat(b)}`;
  }

  // LEVEL 3 – bis 100 €, gelegentlich ·2
  if(level === 3){

    if(Math.random() < 0.75){

      let withCent = randomEuroWithCent(100);
      let wholeEuro = randomEuro(100);

      let op = Math.random() < 0.5 ? "+" : "-";

      let a = withCent;
      let b = wholeEuro;

      if(op === "-" && b > a){
        [a,b] = [b,a];
      }

      correctAnswer = op === "+" ? a + b : a - b;

      return `${randomMoneyFormat(a)} ${op} ${randomMoneyFormat(b)}`;

    } else {

      let a = randomEuroWithCent(40);
      correctAnswer = a * 2;

      return `${randomMoneyFormat(a)} · 2`;
    }
  }
}
function nextTask(){

  if(currentTask>=totalTasks){ endRound(); return; }

  const input=document.getElementById("answerInput");
  input.value="";
  input.classList.remove("wrong");
  input.disabled=true;

  let newTask;
  let safety=0;

  do{
    newTask=generateTask();
    safety++;
  }while(usedTasks.has(newTask)&&safety<50);

  usedTasks.add(newTask);
  currentTaskText=newTask;

  document.getElementById("taskDisplay").textContent=currentTaskText;

  setTimeout(()=>{
    document.getElementById("taskDisplay").textContent="";
    input.disabled=false;
    input.focus();
  },displayDuration);
}

function checkAnswer(){

  let raw=document.getElementById("answerInput").value.replace(",",".");
  let value=parseFloat(raw);

  if(currentMode.includes("geld")){
    value=answerUnit==="euro"?Math.round(value*100):Math.round(value);
  }else{
    value=parseInt(value);
  }

  if(value===correctAnswer){
    correctCount++;
    wrongStreak=0;
    document.getElementById("taskDisplay").textContent="Richtig! ✅";
  }else{
    wrongStreak++;

    if(currentMode.includes("geld")){
      document.getElementById("answerInput").value=
        answerUnit==="euro"?formatMoney(correctAnswer):correctAnswer+" ct";
    }else{
      document.getElementById("answerInput").value=correctAnswer;
    }

    document.getElementById("answerInput").classList.add("wrong");

    if(wrongStreak>=2){
      reduceDifficulty();
      wrongStreak=0;
    }
  }

  currentTask++;
  document.getElementById("stats").textContent=
    `${correctCount} von ${totalTasks} richtig`;

  setTimeout(()=>nextTask(),1200);
}

function repeatTask(){
  document.getElementById("taskDisplay").textContent=currentTaskText;
  setTimeout(()=>{
    document.getElementById("taskDisplay").textContent="";
  },displayDuration);
}

function endRound(){
  document.getElementById("summary").style.display="block";
  document.getElementById("finalMessage").textContent=
    `🎉 Fertig! Du hast ${correctCount} von ${totalTasks} richtig gerechnet.`;

  if(correctCount===totalTasks){
    document.getElementById("perfectImg").style.display="block";
  }

  document.getElementById("reflectionSection").style.display="block";


}
function selectReflection(level){
  selfRating = level;

  positionSelfMarker(level);

  // Jetzt erst Systemmarker anzeigen
  document.getElementById("systemMarker").style.display = "block";
  positionSystemMarker();
}

function getSystemLevel(){
  if(correctCount<=3) return 1;
  if(correctCount<=6) return 2;
  if(correctCount<=8) return 3;
  return 4;
}

function positionSelfMarker(level){
  const items = document.querySelectorAll(".scale-item");
  const marker = document.getElementById("selfMarker");

  const rect = items[level-1].getBoundingClientRect();
  const wrapperRect = document.querySelector(".scale-wrapper").getBoundingClientRect();

  const center = rect.left - wrapperRect.left + rect.width / 2;

  marker.style.left = (center - marker.offsetWidth / 2) + "px";
}

function positionSystemMarker(){
  const systemLevel = getSystemLevel();
  const items = document.querySelectorAll(".scale-item");
  const marker = document.getElementById("systemMarker");

  const rect = items[systemLevel-1].getBoundingClientRect();
  const wrapperRect = document.querySelector(".scale-wrapper").getBoundingClientRect();

  const center = rect.left - wrapperRect.left + rect.width / 2;

  marker.style.left = (center - marker.offsetWidth / 2) + "px";
}
</script>
</body>
</html>
